{% extends "base.html" %}
{% block title %}Datos del cliente — Gloriana{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <h2>Ingrese sus datos</h2>
    <p class="form-sub">Su estrato determina el descuento sobre el total de su compra.</p>

    <form method="POST" action="{{ url_for('cliente_form') }}">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: María García" required/>
        </div>
        <div class="form-group">
          <label for="estrato">Estrato</label>
          <select id="estrato" name="estrato">
            <option value="1">Estrato 1 — Descuento 10%</option>
            <option value="2">Estrato 2 — Descuento 5%</option>
            <option value="3">Estrato 3 — Descuento 2%</option>
            <option value="4" selected>Estrato 4 — Sin descuento</option>
            <option value="5">Estrato 5 — Sin descuento</option>
            <option value="6">Estrato 6 — Sin descuento</option>
          </select>
        </div>
      </div>

      <div class="descuento-info" id="desc-info">
        <span class="badge badge-success">✓ Estrato 4: sin descuento adicional</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Ver catálogo →</button>
    </form>
  </div>
</div>

<script>
const descuentos = {1:10, 2:5, 3:2};
const sel = document.getElementById("estrato");
const info = document.getElementById("desc-info");
sel.addEventListener("change", () => {
  const est = parseInt(sel.value);
  const d = descuentos[est] || 0;
  info.innerHTML = d > 0
    ? `<span class="badge badge-success">✓ Estrato ${est}: descuento ${d}% sobre el total</span>`
    : `<span class="badge badge-neutral">Estrato ${est}: sin descuento adicional</span>`;
});
</script>
{% endblock %}
